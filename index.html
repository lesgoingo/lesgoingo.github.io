<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбиратор PRO — Исправлено</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --accent: #4ecca3;
            --btn-spin: #e94560;
            --li-bg: #f8f9fa;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --btn-spin: #f43f5e;
            --li-bg: #334155;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            margin: 0;
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .theme-btn {
            align-self: flex-end;
            background: var(--card);
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            z-index: 10; /* Чтобы кнопка всегда была сверху */
        }

        .box { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 24px; 
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input { 
            flex-grow: 1;
            padding: 14px; 
            border-radius: 12px; 
            border: 2px solid var(--bg); 
            background: var(--bg);
            color: var(--text); 
            font-size: 16px; 
            outline: none;
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            border-radius: 12px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #list { text-align: left; margin: 15px 0; padding: 0; list-style: none; max-height: 160px; overflow-y: auto; }
        
        li { 
            background: var(--li-bg); 
            margin-bottom: 8px; 
            padding: 12px; 
            border-radius: 12px; 
            border-left: 5px solid var(--accent);
        }

        #result { 
            font-size: 1.6rem; 
            color: var(--btn-spin); 
            font-weight: bold; 
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
        }

        .btn-spin { 
            background: var(--btn-spin); 
            color: white; 
            width: 100%; 
            padding: 20px; 
            border: none; 
            border-radius: 16px; 
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer; /* Убеждаемся, что курсор меняется */
            position: relative;
            display: block;
        }

        .btn-spin:active { transform: scale(0.98); }

        .description {
            max-width: 380px;
            margin-top: 25px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        footer { margin-top: auto; padding: 20px; color: #888; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body class="dark-mode">

    <button class="theme-btn" onclick="toggleTheme()">🌓 Тема</button>

    <div class="box">
<h2 style="color: var(--accent); margin-top: 0;">ВЫБИРАТОР</h2>
        
        <div class="input-group">
            <input type="text" id="inp" placeholder="Введите вариант..." autocomplete="off">
            <button onclick="add()" class="btn-add">+</button>
        </div>
        
        <ul id="list"></ul>
        <div id="result">ЖДУ ВАРИАНТЫ</div>
        
        <button type="button" onclick="chooseNow()" class="btn-spin">УЗНАТЬ ВЫБОР</button>
        
        <button onclick="clearAll()" style="background:none; border:none; color:#888; cursor:pointer; margin-top:15px; text-decoration:underline;">Очистить всё</button>
    </div>

    <div class="description">
        <b>Инструкция:</b> Добавьте минимум два варианта и нажмите на красную кнопку. Система выберет один случайным образом.
    </div>

    <footer>
        © 2026 Разработано пользователем Lesgoingo
    </footer>

<script>
    var items = [];

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function add() {
        var pole = document.getElementById('inp');
        var text = pole.value.trim();
        if (text !== "") {
            items.push(text);
            var li = document.createElement('li');
            li.textContent = text;
            document.getElementById('list').appendChild(li);
            pole.value = "";
            pole.focus();
        }
    }

    // Переименовал функцию для надежности
    function chooseNow() {
        if (items.length < 2) {
            alert("Нужно добавить хотя бы 2 варианта!");
            return;
        }
        
        var resDiv = document.getElementById('result');
        var count = 0;
        
        // Запускаем перебор
        var timer = setInterval(function() {
            var randomIndex = Math.floor(Math.random() * items.length);
            resDiv.innerText = items[randomIndex].toUpperCase();
            count++;
            
            if (count > 12) {
                clearInterval(timer);
                // Запуск конфетти при финале
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }
        }, 80);
    }

    function clearAll() {
        items = [];
        document.getElementById('list').innerHTML = "";
        document.getElementById('result').innerText = "ЖДУ ВАРИАНТЫ";
    }

    document.getElementById('inp').addEventListener('keydown', function(e) {
        if (e.key === "Enter") add();
    });
</script>

</body>
</html>
